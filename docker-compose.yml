# Local development infrastructure for Pusula v2.
# Project name and host ports are chosen to coexist with the v1 project at
# D:\projects\pusula (which uses 5435 / 9000-9001 and project name "pusula").
name: pusula_v2

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pusula
      POSTGRES_PASSWORD: pusula
      POSTGRES_DB: pusula
      TZ: Europe/Istanbul
      PGTZ: Europe/Istanbul
    ports:
      - "5436:5432"
    volumes:
      - pusula_v2_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pusula -d pusula"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - pusula_v2_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - pusula_v2_minio:/data

  # Bootstrap'lar (her startup'ta idempotent):
  #   - `pusula` bucket'ı (attachments + avatars) + public-read `avatars/`
  #   - `pusula-reports` bucket'ı (Faz 13I rapor render asset'leri — DEM-276
  #     follow-up; ilk deploy'da elle yapılmıştı, otomasyona alındı)
  #   - `pusula-app` policy (her iki bucket'a RW + List) — `infra/minio/policies/
  #     pusula-app.json`'dan okur. Dev'de service account zaten root (`minioadmin`)
  #     ile çalışıyor; policy create yine de yapılır ki dev'de service account
  #     oluşturmak istenirse template hazır olur ve dev↔prod simetri korunur.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      - minio
    volumes:
      - ./infra/minio/policies:/policies:ro
    entrypoint:
      - /bin/sh
      - -c
      - >
        until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
        mc mb --ignore-existing local/pusula;
        mc mb --ignore-existing local/pusula-reports;
        mc anonymous set download local/pusula/avatars;
        mc admin policy create local pusula-app /policies/pusula-app.json || mc admin policy update local pusula-app /policies/pusula-app.json;
        exit 0;

volumes:
  pusula_v2_postgres:
  pusula_v2_redis:
  pusula_v2_minio:
