# Local development infrastructure for Pusula v2.
# Project name and host ports are chosen to coexist with the v1 project at
# D:\projects\pusula (which uses 5435 / 9000-9001 and project name "pusula").
name: pusula_v2

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pusula
      POSTGRES_PASSWORD: pusula
      POSTGRES_DB: pusula
      TZ: Europe/Istanbul
      PGTZ: Europe/Istanbul
    ports:
      - "5436:5432"
    volumes:
      - pusula_v2_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pusula -d pusula"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - pusula_v2_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - pusula_v2_minio:/data

  # Creates the default bucket on startup, then exits.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - >
        until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
        mc mb --ignore-existing local/pusula;
        exit 0;

volumes:
  pusula_v2_postgres:
  pusula_v2_redis:
  pusula_v2_minio:
