# =========================================================================
# Pusula v2 — production stack (DEM-60).
# Dokploy "Docker Compose" service type: point Dokploy at the repo + branch +
# this file; the whole stack deploys as one unit. SEPARATE from the local
# `docker-compose.yml` — here Postgres is not published, no dev credentials,
# named volumes for backup. Env values are injected by Dokploy; `${VAR}`
# references below are filled from the Dokploy service "Environment" tab.
# Runbook: docs/architecture/12-deployment-runbook.md
# =========================================================================
name: pusula

services:
  # --- one-off: apply schema migrations, then exit -----------------------
  migrate:
    image: pusula-api:latest # built by the `api` service below
    command: ['pnpm', 'db:migrate']
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres: { condition: service_healthy }
    restart: 'no'

  # --- tRPC + Hono HTTP server -------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: pusula-api:latest # shared by `migrate` and `worker`
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      APP_URL: ${APP_URL}
      API_URL: ${API_URL}
      API_PORT: 3001
      S3_ENDPOINT: ${S3_ENDPOINT}
      # Browser-facing public origin for avatar objects (DEM-160). Must be the
      # public MinIO URL — S3_ENDPOINT here is the internal `minio:9000`.
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      SENTRY_DSN_API: ${SENTRY_DSN_API}
      # Faz 13I/13T (DEM-265/276) — `report.print.requestToken` /
      # `verifyToken` HMAC-SHA256 imza secret'i. Worker print akışı tek nokta
      # güven; min 32 char. api ve worker AYNI değeri taşımalı. Boş bırakılırsa
      # `apps/api/src/env.ts` production hardening boot'u durdurur.
      WORKER_SHARED_SECRET: ${WORKER_SHARED_SECRET}
      # Faz 16A (DEM-310) — Better Auth `genericOAuth` plugin Google Takvim
      # hesap bağlama için. İkisi de boş = entegrasyon kapalı (plugin mount
      # edilmez, `/api/auth/oauth2/*` 404 döner); yarım set prod boot'u durdurur
      # (`apps/api/src/env.ts` assertProductionHardening). Worker'a gerek yok —
      # token akışı yalnız api tarafında. Bkz. `docs/architecture/19-takvim-entegrasyonu.md` §4.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    depends_on:
      migrate: { condition: service_completed_successfully }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    # Traefik (Dokploy) — domain via these labels or the Dokploy UI "Domains" tab:
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.pusula-api.rule=Host(`api.${ROOT_DOMAIN}`)'
      - 'traefik.http.routers.pusula-api.entrypoints=websecure'
      - 'traefik.http.routers.pusula-api.tls.certresolver=letsencrypt'
      - 'traefik.http.services.pusula-api.loadbalancer.server.port=3001'
      # Güvenlik header'ları — `secheaders-all` (HSTS+nosniff+referrer) tüm
      # router'larda; `secheaders-frame` (X-Frame-Options: DENY) yalnız web+api.
      # `pusula-ratelimit` IP başına brute-force/bombardıman koruması.
      - 'traefik.http.routers.pusula-api.middlewares=secheaders-all,secheaders-frame,pusula-ratelimit'
      # --- Ortak güvenlik header middleware'leri (burada tanımlanır, tüm
      # router'lar referans verir; Traefik middleware tanımı global'dir) ---
      - 'traefik.http.middlewares.secheaders-all.headers.stsSeconds=63072000'
      - 'traefik.http.middlewares.secheaders-all.headers.stsIncludeSubdomains=true'
      - 'traefik.http.middlewares.secheaders-all.headers.stsPreload=true'
      - 'traefik.http.middlewares.secheaders-all.headers.contentTypeNosniff=true'
      - 'traefik.http.middlewares.secheaders-all.headers.referrerPolicy=strict-origin-when-cross-origin'
      # frameDeny YALNIZ web+api — `s3` router'ı PDF iframe önizleme için
      # ALMAMALI (pusulaportal.com sayfası s3.pusulaportal.com'u iframe'liyor).
      - 'traefik.http.middlewares.secheaders-frame.headers.frameDeny=true'
      # API rate limit — IP başına. average=100 req/s, burst=200 (cömert:
      # optimistic UI çok sayıda küçük istek atar, normal kullanım engellenmez).
      - 'traefik.http.middlewares.pusula-ratelimit.ratelimit.average=100'
      - 'traefik.http.middlewares.pusula-ratelimit.ratelimit.burst=200'
    networks:
      - default # iç ağ — postgres / redis / minio
      - dokploy-network # Dokploy Traefik bu ağ üzerinden yönlendirir

  # --- BullMQ worker (notifications / realtime publish / cleanup / etc.) --
  worker:
    image: pusula-api:latest # same image as `api`, different command
    command: ['node', 'apps/worker/dist/index.js']
    restart: unless-stopped
    # Faz 13T (DEM-276) — Puppeteer Chromium + recharts render için worker'a
    # memory + cpu sınırı. Spec §16.8: render concurrency=2, page başına
    # ~200MB; browser singleton + 2 page + node heap → ~1GB tavan yeterli.
    # OOM aşılırsa Docker SIGKILL → unless-stopped restart → kuyruktan
    # yeniden alır. cpus=2 paralel render'ı yavaşlatmasın diye.
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '2'
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      # Bildirim/auth e-postalarındaki derin bağlantıların (davet, kart, parola
      # sıfırlama) tabanı. Worker e-posta/push şablonlarını bu değerden üretir;
      # eksikse Zod default'u localhost'a düşer ve maillerdeki linkler bozulur.
      # Faz 13I — Puppeteer print sayfası da bu URL üzerinden açılır.
      APP_URL: ${APP_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      SENTRY_DSN_WORKER: ${SENTRY_DSN_WORKER}
      # Faz 13I/13T (DEM-265/276) — print akışı paylaşılan secret. api ile
      # AYNI değer. apps/worker/src/env.ts production hardening guard'ı boş
      # bırakılırsa boot'u durdurur.
      WORKER_SHARED_SECRET: ${WORKER_SHARED_SECRET}
      # Faz 13I (DEM-265) — Puppeteer worker `report.print.requestToken`
      # çağrısı için iç ağ üzerinden api hostname. compose servis adı +
      # API_PORT (default 3001). Public API_URL kullanılsa Traefik üzerinden
      # tekrar dışa çıkıp gelir (gereksiz hop + TLS handshake).
      INTERNAL_API_URL: http://api:3001
      # Faz 13I (DEM-265) — rapor render asset'leri için ayrı bucket; lifecycle
      # ve ACL politikası attachment bucket'ından (S3_BUCKET=pusula) izole.
      # MinIO konsoluyla ilk deploy öncesi MANUEL oluşturulmalı (runbook §12.7).
      S3_REPORTS_BUCKET: ${S3_REPORTS_BUCKET:-pusula-reports}
      # Faz 13P (DEM-272) — retention worker. İLK HAFTA 'true' kalır (dry-run);
      # operator log incelemesi sonrası kullanıcı onayıyla 'false' set edilir
      # (Dokploy env panel + worker restart). docs/architecture/16-raporlama
      # -mimarisi.md §16.17 + risk tablosu.
      REPORT_RETENTION_DRY_RUN: ${REPORT_RETENTION_DRY_RUN:-true}
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    # No Traefik labels — the worker exposes no HTTP.

  # --- Next.js web app ----------------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Inlined at build time → must equal https://api.${ROOT_DOMAIN}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        # Sentry pusula-web DSN — build zamanında bundle'a inline edilir.
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN}
    image: pusula-web:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # Faz 14E (DEM-295) — `apps/web/.../api/boards/[boardId]/report` route
      # handler `@pusula/db` üzerinden `getDb()` çağırır. Web container'ında
      # runtime DATABASE_URL gerek; aksi halde route 500 + Zod env hatası.
      # Dockerfile build-time placeholder ayrı (next build "Collecting page
      # data" için); bu satır runtime override sağlar (Dokploy env injection).
      DATABASE_URL: ${DATABASE_URL}
      # Faz 13T (DEM-276) — Server Component'lar (print/widget render) tRPC
      # API'sine server-side fetch atar. Internal Docker network'ü
      # (`api:3001`) public URL'e göre hem hızlı hem reverse-proxy bağımsız.
      # Worker tarafıyla simetrik (compose `worker.environment.INTERNAL_API_URL`
      # aynı değer). Web `page.tsx`/widget `page.tsx` bu env yoksa
      # `env.ts` default'u `http://localhost:3001`'a düşer → ECONNREFUSED →
      # `notFound()` → Puppeteer 404 görür → `__reportReady` set olmaz →
      # `pdf_render_failed` 30s timeout.
      INTERNAL_API_URL: http://api:3001
      # Server Component'lar `env.ts`'i runtime'da import edip default'a (
      # `http://localhost:3001`) düşmesin diye runtime env de set. Build args
      # NEXT_PUBLIC_API_URL (yukarıda) browser bundle inline; bu satır
      # share/verify-email/route handler gibi henüz INTERNAL_API_URL'a
      # taşınmamış Server Component'ler için fallback'i doğru tutar.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      api: { condition: service_started }
    labels:
      - 'traefik.enable=true'
      # Web kök domain'de yayınlanır (DEM-60 sonrası karar); www. → köke kalıcı yönlendirilir.
      - 'traefik.http.routers.pusula-web.rule=Host(`${ROOT_DOMAIN}`) || Host(`www.${ROOT_DOMAIN}`)'
      - 'traefik.http.routers.pusula-web.entrypoints=websecure'
      - 'traefik.http.routers.pusula-web.tls.certresolver=letsencrypt'
      # Mevcut www→kök redirect KORUNUR; güvenlik header'ları zincire eklenir
      # (web router frameDeny ALIR — web kendini iframe'lemez).
      - 'traefik.http.routers.pusula-web.middlewares=pusula-www-redirect,secheaders-all,secheaders-frame'
      - 'traefik.http.services.pusula-web.loadbalancer.server.port=3000'
      - 'traefik.http.middlewares.pusula-www-redirect.redirectregex.regex=^https?://www\.(.+)'
      - 'traefik.http.middlewares.pusula-www-redirect.redirectregex.replacement=https://$${1}'
      - 'traefik.http.middlewares.pusula-www-redirect.redirectregex.permanent=true'
    networks:
      - default # iç ağ — api ile iletişim
      - dokploy-network # Dokploy Traefik bu ağ üzerinden yönlendirir

  # --- PostgreSQL — transactional source of truth -------------------------
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Europe/Istanbul
      PGTZ: Europe/Istanbul
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 20
    # No `ports:` — Postgres is never exposed to the internet. Use an SSH
    # tunnel for admin access (runbook §12.12).

  # --- Redis — BullMQ queue + Socket.IO adapter ---------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # `--requirepass` ile parola zorunlu — bir container ele geçirilse bile
    # Redis'e (BullMQ kuyrukları + Socket.IO adapter) kimlik doğrulamasız
    # erişilemez. `REDIS_URL` parolayı taşır: redis://:${REDIS_PASSWORD}@redis:6379
    command: ['redis-server', '--appendonly', 'yes', '--requirepass', '${REDIS_PASSWORD}']
    environment:
      # Healthcheck'in AUTH yapabilmesi için container içinde de mevcut.
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep -q PONG']
      interval: 5s
      timeout: 5s
      retries: 20

  # --- MinIO — S3-compatible object storage (attachments) -----------------
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      # Root kimliği YALNIZ minio servisinde. api/worker artık root değil,
      # dar-yetkili bir service account kullanır (S3_ACCESS_KEY_ID/SECRET) —
      # yalnız `pusula` bucket'ına erişir, admin/diğer bucket yetkisi yok.
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Web konsolu prod'da hiç başlamasın — yalnız S3 API (port 9000) açık.
      MINIO_BROWSER: 'off'
    volumes:
      - minio_data:/data
    networks:
      - default # iç ağ — api/worker server-to-server S3 erişimi (minio:9000)
      - dokploy-network # external — Traefik s3.${ROOT_DOMAIN}'i buraya yönlendirir
    # Traefik — S3 API'sini (port 9000) tarayıcıya açar: presigned avatar
    # upload (PUT) + presigned attachment download + public avatar okuma
    # hepsi `https://s3.${ROOT_DOMAIN}` üzerinden gider (S3_PUBLIC_URL).
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.pusula-s3.rule=Host(`s3.${ROOT_DOMAIN}`)'
      - 'traefik.http.routers.pusula-s3.entrypoints=websecure'
      - 'traefik.http.routers.pusula-s3.tls.certresolver=letsencrypt'
      - 'traefik.http.services.pusula-s3.loadbalancer.server.port=9000'
      # KRİTİK: s3 router'ı YALNIZ `secheaders-all` alır (HSTS+nosniff+referrer).
      # frameDeny UYGULANMAZ — kart eki PDF önizlemesi pusulaportal.com sayfası
      # içinde `<iframe src="https://s3.pusulaportal.com/...">` kullanıyor;
      # X-Frame-Options: DENY önizlemeyi kırardı.
      - 'traefik.http.routers.pusula-s3.middlewares=secheaders-all'
    # No healthcheck — the minio/minio image ships neither `mc` nor `curl`, so
    # the runbook template's `mc ready local` check cannot run. No service
    # depends on minio with `service_healthy`; the API/worker S3 client retries
    # until MinIO is up. Bucket'lar + policy artık `minio-setup` servisi
    # tarafından her deploy'da idempotent bootstrap edilir (DEM-276 follow-up
    # 2026-06-01 — manuel runbook adımı 4 günlük incident'in kanıt katmanıydı).
    # Expose the console on its own subdomain via Traefik labels
    # (`...server.port=9001`) only if needed.

  # --- MinIO bootstrap (one-off, idempotent) -----------------------------
  # Her deploy'da çalışır, `pusula` + `pusula-reports` bucket'larını oluşturur,
  # `avatars/` prefix'ini anonim okumaya açar, `pusula-app` service account
  # policy'sini `infra/minio/policies/pusula-app.json`'dan günceller.
  # `mc admin policy create` modern mc'de aynı isimde policy varsa
  # overwrite eder; eski mc fallback'i `update` ile dener. Service account'un
  # KENDISI prod'da elle oluşturulur (`mc admin user svcacct add ...`) —
  # secret üretimi bootstrap'a girmez; policy template hazır olduğu için
  # service account oluşturulurken `--policy pusula-app` ile bağlanır.
  # DEM-276 follow-up: ilk deploy'da `pusula-reports` bucket'ı + policy
  # adımı manuel kaldı, atlandı, 4 gün incident'e sebep oldu — artık otomatik.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      - minio
    volumes:
      - ./infra/minio/policies:/policies:ro
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint:
      - /bin/sh
      - -c
      - >
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do sleep 1; done;
        mc mb --ignore-existing local/pusula;
        mc mb --ignore-existing local/pusula-reports;
        mc anonymous set download local/pusula/avatars;
        mc admin policy create local pusula-app /policies/pusula-app.json || mc admin policy update local pusula-app /policies/pusula-app.json;
        exit 0;
    restart: 'no'
    networks:
      - default

volumes:
  pg_data:
  redis_data:
  minio_data:

networks:
  # `default` — compose'un kendi iç ağı (servisler arası iletişim).
  # `dokploy-network` — Dokploy'un Traefik'inin bulunduğu external ağ;
  # web + api yalnız bu ağa bağlıyken HTTPS trafiği alır.
  dokploy-network:
    external: true
